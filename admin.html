        const artistSlug = getArtistSlugFromArtist(artist);
        expEnsureArtistFolders(artistSlug);
        const title = formatTitleCase(row.title || "Unknown Title");
        const albumSlug = expUniqueSlug(
          `${title}_single`,
          new Set(albumsDatabase.map((album) => album.albumID)),
          `alb_${artistSlug}_`,
        );
        return {
          albumID: `alb_${artistSlug}_${albumSlug}`,
          title,
          artistID: artist.artistID,
          releaseDate: row.releaseDate || "",
          firstlistenDate: expTodayIso(),
          albumType: "single",
          genre: [],
          tags: [],
          paths: {
            cover: `./assets/${artistSlug}/albums/${albumSlug}.png`,

      function expSleep(ms) {
        return new Promise((resolve) => setTimeout(resolve, ms));
      }

      window.expDownloadSpotifyImport = async function () {
        if (spotifyImportState.downloading) return;
        if (spotifyImportState.searching) return alert("Wait for the YouTube matching to finish first.");
        const unresolved = spotifyImportState.tracks.find((row) => !row.skipped && !row.selectedVideo);
        if (unresolved) return alert(`Select or skip "${unresolved.title}" before downloading.`);
        const rows = spotifyImportState.tracks.filter(
          (row) =>
            !row.skipped &&
            row.selectedVideo &&
            row.status !== "sent" &&
            row.status !== "downloading",
        );
        if (!rows.length) return alert("No selected tracks are ready to download.");

        const missingArtist = rows.find(
          (row) => row.isNewArtist && !String(row.artistName || "").trim(),
        );
        if (missingArtist) return alert(`Missing artist name for "${missingArtist.title}".`);

        spotifyImportState.downloading = true;
        spotifyImportState.downloadCancelRequested = false;
        let added = 0;
        try {
          for (const row of rows) {
            if (spotifyImportState.downloadCancelRequested) {
              row.status = "cancelled";
              break;
            }
            const { artist, created } = expEnsureArtistForImport(row);
            const album = expCreateSingleAlbumForImport(row, artist);
            albumsDatabase.unshift(album);
            const duration =
              row.selectedVideo.duration_seconds ||
              parseDuration(row.selectedVideo.duration || "") ||
              row.duration ||
              0;
            const song = expCreateSongObject(
              album.albumID,
              formatTitleCase(row.title),
              duration,
            );
            songsDatabase.unshift(song);
            row.songID = song.songID;
            row.albumID = album.albumID;
            row.status = "sent";
            added++;
            expPendingDownloadNormalizations.set(song.songID, {
              audioRel: song.paths.audio,
              attempts: 0,
            });
            ipcRenderer.send("download-experimental-song", {
              youtubeUrl: row.selectedVideo.url,
              title: song.title,
              audioPath: song.paths.audio,
              lyricsPath: song.paths.lyrics,
              coverPath: album.paths.cover,
              profilePath: created ? artist.paths.cover : null,
            });
            renderSpotifyImportRows();
            await expSleep(250);
          }
          if (added) {
            expSaveDatabases(
              `${added} singles added. Downloads started and will auto-normalize as WAV files finish.`,
            );
          } else {
            expSetStatus("Playlist download cancelled before any songs were added.");
          }
        } catch (err) {
          alert(err.message);
        } finally {
          spotifyImportState.downloading = false;
          spotifyImportState.downloadCancelRequested = false;
          renderSpotifyImportRows();
        }
      };

      function expFormatLrcTime(totalCentiseconds) {
        const safeTotal = Math.max(0, Math.round(totalCentiseconds));
        const minutes = Math.floor(safeTotal / 6000);
        const seconds = Math.floor((safeTotal % 6000) / 100);
        const centiseconds = safeTotal % 100;
        return `${String(minutes).padStart(2, "0")}:${String(seconds).padStart(2, "0")}.${String(centiseconds).padStart(2, "0")}`;
      }

      function expShiftLrcText(text, deltaSeconds) {
        const deltaCentiseconds = Math.round((Number(deltaSeconds) || 0) * 100);
        return String(text || "").replace(
          /\[(\d{1,3}):(\d{1,2})(?::(\d{1,2}))?(?:\.(\d{1,3}))?\]/g,
          (match, first, second, third, fraction = "0") => {
            let hours = 0;
            let minutes = parseInt(first, 10) || 0;
            let seconds = parseInt(second, 10) || 0;
            if (third !== undefined) {
              hours = minutes;
              minutes = seconds;
              seconds = parseInt(third, 10) || 0;
            }
            const centiseconds = parseInt(String(fraction).padEnd(2, "0").slice(0, 2), 10) || 0;
            const current = (((hours * 60 + minutes) * 60 + seconds) * 100) + centiseconds;
            return `[${expFormatLrcTime(current + deltaCentiseconds)}]`;
          },
        );
      }

      window.expShiftLrcTimestamps = function (direction) {
        const textarea = document.getElementById("exp-lyrics-text");
        const input = document.getElementById("exp-lrc-shift-seconds");
        if (!textarea || !input) return;
        const amount = Math.abs(parseFloat(input.value) || 0);
        if (!amount) return alert("Enter the number of seconds to add or subtract, like 0.25 or 1.00.");
        textarea.value = expShiftLrcText(textarea.value, amount * direction);
        expSetStatus(`Shifted lyrics timestamps by ${direction > 0 ? "+" : "-"}${amount.toFixed(2)}s. Save the song to write it to the .lrc file.`);
      };

      window.expDeleteCurrent = async function () {
        const section = expState.section;
        const cfg = EXP_SECTIONS[section];
        if (!cfg) return;
        const item = cfg
          .data()
          .find((entry) => entry[cfg.idKey] === expState.selectedId);
        if (!item) return;

        let message = "";
        let statusMessage = "Deleted item.";
        if (section === "artists") {
          const artistAlbums = albumsDatabase.filter(
            (album) => album.artistID === item.artistID,
          );
          const albumIds = new Set(artistAlbums.map((album) => album.albumID));
          const songCount = songsDatabase.filter(
            (song) =>
              song.artistID === item.artistID || albumIds.has(song.albumID),
          ).length;
          message = `Delete artist "${item.artist}"? This will also remove ${artistAlbums.length} album/EP/single entries, ${songCount} song entries, and the artist folder in ./assets/.`;
          statusMessage = `Deleted artist "${item.artist}" and related assets.`;
        } else if (section === "albums") {
          const songCount = songsDatabase.filter(
            (song) => song.albumID === item.albumID,
          ).length;
          message = `Delete album "${item.title}"? This will also remove ${songCount} song entr${songCount === 1 ? "y" : "ies"} from the database and delete the related cover/audio/lyrics files from ./assets/.`;
          statusMessage = `Deleted album "${item.title}" and related assets.`;
        } else if (section === "songs") {
          message = `Delete song "${item.title}"? This removes it from the database and deletes its audio/lyrics files from ./assets/.`;
          statusMessage = `Deleted song "${item.title}" and related assets.`;
        }

        const confirmName = section === "artists" ? item.artist : item.title;
        const confirmed = await expAskConfirm(
          message,
          "Confirm delete",
          confirmName,
        );
        if (!confirmed) return;

        const filesToDelete = [];
        const foldersToDelete = [];

        if (section === "artists") {
          const deletedArtistID = item.artistID;
          const artistSlug = getArtistSlugFromArtist(item);
          if (artistSlug) foldersToDelete.push(`./assets/${artistSlug}`);
          const deletedAlbumIds = new Set(
            albumsDatabase
              .filter((album) => album.artistID === deletedArtistID)
              .map((album) => album.albumID),
          );
          for (let i = songsDatabase.length - 1; i >= 0; i--) {
            if (
              songsDatabase[i].artistID === deletedArtistID ||
              deletedAlbumIds.has(songsDatabase[i].albumID)
            )
              songsDatabase.splice(i, 1);
          }
          for (let i = albumsDatabase.length - 1; i >= 0; i--) {
            if (albumsDatabase[i].artistID === deletedArtistID)
              albumsDatabase.splice(i, 1);
          }
          const index = artistsDatabase.findIndex(
            (artist) => artist.artistID === deletedArtistID,
          );
          if (index >= 0) artistsDatabase.splice(index, 1);
          expState.lastArtistID = artistsDatabase[0]?.artistID || null;
        }

        if (section === "albums") {
          const deletedAlbumID = item.albumID;
          if (item.paths?.cover) filesToDelete.push(item.paths.cover);
          for (let i = songsDatabase.length - 1; i >= 0; i--) {
            if (songsDatabase[i].albumID === deletedAlbumID) {
              if (songsDatabase[i].paths?.audio)
                filesToDelete.push(songsDatabase[i].paths.audio);
              if (songsDatabase[i].paths?.lyrics)
                filesToDelete.push(songsDatabase[i].paths.lyrics);
              songsDatabase.splice(i, 1);
            }
          }
          const index = albumsDatabase.findIndex(
            (album) => album.albumID === deletedAlbumID,
          );
          if (index >= 0) albumsDatabase.splice(index, 1);
          expState.lastAlbumID = albumsDatabase[0]?.albumID || null;
        }

        if (section === "songs") {
          const deletedSongID = item.songID;
          if (item.paths?.audio) filesToDelete.push(item.paths.audio);
          if (item.paths?.lyrics) filesToDelete.push(item.paths.lyrics);
          const index = songsDatabase.findIndex(
            (song) => song.songID === deletedSongID,
          );
          if (index >= 0) songsDatabase.splice(index, 1);
          const remainingAlbumSongs = songsDatabase.filter(
            (song) => song.albumID === item.albumID,
          );
          if (remainingAlbumSongs.length === 0) {
            const albumIndex = albumsDatabase.findIndex(
              (album) => album.albumID === item.albumID,
            );
            if (albumIndex >= 0) {
              const album = albumsDatabase[albumIndex];
              if (album.paths?.cover) filesToDelete.push(album.paths.cover);
              albumsDatabase.splice(albumIndex, 1);
            }
          }
        }

        const remaining = getFilteredExperimentalItems();
        expState.selectedId =
          remaining[0]?.[cfg.idKey] || cfg.data()[0]?.[cfg.idKey] || null;
        expState.youtubeResult = null;
        expSendDeleteWithAssets(filesToDelete, foldersToDelete, statusMessage);
        renderExperimentalSection();
      };

      function expMaybeRenameSongFiles(song, oldSong) {
        if (!oldSong.title || oldSong.title === song.title) return;
        const artistSlug = getArtistSlugById(song.artistID);
        const newSlug = makeSlug(song.title);
        const newSongId = `${artistSlug}_${newSlug}`;
        const newAudio = `./assets/${artistSlug}/songs/${newSlug}.wav`;
        const newLyrics = `./assets/${artistSlug}/lyrics/${newSlug}.lrc`;
        expRenameFile(oldSong.paths?.audio, newAudio);
        expRenameFile(oldSong.paths?.lyrics, newLyrics);
        song.songID = newSongId;
        song.paths.audio = newAudio;
        song.paths.lyrics = newLyrics;
      }

      function expRenameFile(oldRel, newRel) {
        if (!oldRel || !newRel || oldRel === newRel) return;
        const oldAbs = relToAbs(oldRel);
        const newAbs = relToAbs(newRel);
        fs.mkdirSync(path.dirname(newAbs), { recursive: true });
        if (fs.existsSync(oldAbs) && !fs.existsSync(newAbs))
          fs.renameSync(oldAbs, newAbs);
      }

      function expWriteLyrics(song) {
        const textArea = document.getElementById("exp-lyrics-text");
        if (!textArea || !song.paths?.lyrics) return;
        const lyricsAbs = relToAbs(song.paths.lyrics);
        fs.mkdirSync(path.dirname(lyricsAbs), { recursive: true });
        fs.writeFileSync(lyricsAbs, textArea.value, "utf8");
      }

          if (entry !== node) entry.classList.remove("exp-drag-over");

        if (node) node.classList.remove("exp-drag-over");

      window.expStartDrag = function (event, id) {
        expState.dragId = id;

        if (event.currentTarget)
          event.currentTarget.classList.add("exp-dragging");

      window.expDropItem = function (event, targetId, node) {
        event.preventDefault();
        const cfg = EXP_SECTIONS[expState.section];
        if (!cfg || !expState.dragId || expState.dragId === targetId)
          return expDragEnd();
        const data = cfg.data();
        const from = data.findIndex(
          (item) => item[cfg.idKey] === expState.dragId,
        );
        const to = data.findIndex((item) => item[cfg.idKey] === targetId);
        if (from < 0 || to < 0) return expDragEnd();
        const [moved] = data.splice(from, 1);
        data.splice(to, 0, moved);
        expSaveDatabases("Order saved.");
        expDragEnd();
        renderExperimentalList();
      };

      window.expTrackDrop = function (event, targetSongID, node) {
        event.preventDefault();
        if (!expState.trackDragId || expState.trackDragId === targetSongID)
          return expDragEnd();
        const albumID = expState.selectedId;
        const tracks = songsDatabase
          .filter((song) => song.albumID === albumID)
          .sort((a, b) => (a.track || 0) - (b.track || 0));
        const from = tracks.findIndex(
          (song) => song.songID === expState.trackDragId,
        );
        const to = tracks.findIndex((song) => song.songID === targetSongID);
        if (from < 0 || to < 0) return expDragEnd();
        const [moved] = tracks.splice(from, 1);
        tracks.splice(to, 0, moved);
        tracks.forEach((song, index) => {
          song.track = index + 1;

        expSaveDatabases("Track order saved.");
        expDragEnd();
        renderExperimentalEditor();
        renderExperimentalList();

          track,
          duration,
          releaseDate: album?.releaseDate || "",

      function readFileDataUrl(file) {
        return new Promise((resolve, reject) => {
          const reader = new FileReader();
          reader.onload = () => resolve(reader.result);
          reader.onerror = reject;
          reader.readAsDataURL(file);
        });
      }

      function loadImage(src) {
        return new Promise((resolve, reject) => {
          const img = new Image();
          img.onload = () => resolve(img);
          img.onerror = reject;
          img.src = src;
        });
      }

      async function expWriteSquarePng(file, relTarget) {
        const dataUrl = await readFileDataUrl(file);
        const img = await loadImage(dataUrl);
        const canvas = document.createElement("canvas");
        canvas.width = 1200;
        canvas.height = 1200;
        const ctx = canvas.getContext("2d");
        const crop = Math.min(img.width, img.height);
        const sx = (img.width - crop) / 2;
        const sy = (img.height - crop) / 2;
        ctx.drawImage(img, sx, sy, crop, crop, 0, 0, 1200, 1200);
        const base64 = canvas
          .toDataURL("image/png")
          .replace(/^data:image\/png;base64,/, "");
        const absTarget = relToAbs(relTarget);
        fs.mkdirSync(path.dirname(absTarget), { recursive: true });
        fs.writeFileSync(absTarget, Buffer.from(base64, "base64"));
      }

      function expSetStatus(message) {

      function expTryNormalizePendingDownloads(delayMs = 0) {
        setTimeout(() => {
          expPendingDownloadNormalizations.forEach((pending, songID) => {
            expNormalizeDownloadedSong(songID, pending);
          });
        }, delayMs);
      }

      function expParseIntegratedLufs(output) {
        const text = String(output || "");
        const integratedMatches = [
          ...text.matchAll(/Integrated loudness:\s*[\s\S]*?I:\s*(-?\d+(?:\.\d+)?)\s*LUFS/gi),
        ];
        if (integratedMatches.length) {
          const value = parseFloat(
            integratedMatches[integratedMatches.length - 1][1],
          );
          if (Number.isFinite(value)) return value;
        }

        const shortMatches = [...text.matchAll(/\bI:\s*(-?\d+(?:\.\d+)?)\s*LUFS/gi)];
        if (shortMatches.length) {
          const value = parseFloat(shortMatches[shortMatches.length - 1][1]);
          if (Number.isFinite(value)) return value;
        }

        return null;
      }

      function expNormalizeDownloadedSong(songID, pending) {
        if (!pending || expNormalizingSongs.has(songID)) return;
        const audioAbs = relToAbs(pending.audioRel);
        let ready = false;
        try {
          ready = fs.existsSync(audioAbs) && fs.statSync(audioAbs).size > 4096;
        } catch (err) {
          ready = false;
        }
        if (!ready) {
          pending.attempts = (pending.attempts || 0) + 1;
          if (pending.attempts <= 20) {
            setTimeout(() => expNormalizeDownloadedSong(songID, pending), 1500);
          } else {
            expSetStatus(
              "Download finished, but I could not find the WAV to normalize: " +
                pending.audioRel,
            );
          }
          return;
        }

        const ffmpegPath = path.join(__dirname, "ffmpeg.exe");
        const ffmpegExe = fs.existsSync(ffmpegPath) ? ffmpegPath : "ffmpeg";
        const tmpAbs = path.join(
          path.dirname(audioAbs),
          `${path.basename(audioAbs, path.extname(audioAbs))}.__normalized_tmp.wav`,
        );
        const lufs = -10;
        expNormalizingSongs.add(songID);
        expSetStatus(
          "Download finished. Measuring average loudness for static normalization...",
        );

        childProcess.execFile(
          ffmpegExe,
          [
            "-hide_banner",
            "-nostats",
            "-i",
            audioAbs,
            "-filter_complex",
            "ebur128=framelog=verbose",
            "-f",
            "null",
            "-",
          ],
          { maxBuffer: 1024 * 1024 * 12 },
          (measureError, stdout, stderr) => {
            const measuredLufs = expParseIntegratedLufs(`${stdout}\n${stderr}`);
            if (!Number.isFinite(measuredLufs)) {
              expNormalizingSongs.delete(songID);
              expSetStatus(
                "Song downloaded, but I could not measure its LUFS. Try Batch Normalize manually.",
              );
              return;
            }

            const gainDb = lufs - measuredLufs;
            expSetStatus(
              `Measured ${measuredLufs.toFixed(2)} LUFS. Applying constant ${gainDb.toFixed(2)} dB gain...`,
            );

            childProcess.execFile(
              ffmpegExe,
              [
                "-y",
                "-i",
                audioAbs,
                "-af",
                `volume=${gainDb.toFixed(2)}dB`,
                "-c:a",
                "pcm_s16le",
                tmpAbs,
              ],
              (normalizeError) => {
                expNormalizingSongs.delete(songID);
                if (normalizeError) {
                  try {
                    if (fs.existsSync(tmpAbs)) fs.unlinkSync(tmpAbs);
                  } catch (cleanupErr) {}
                  expSetStatus(
                    "Song downloaded, but static normalization failed. Try Batch Normalize manually.",
                  );
                  return;
                }
                try {
                  fs.copyFileSync(tmpAbs, audioAbs);
                  fs.unlinkSync(tmpAbs);
                  expPendingDownloadNormalizations.delete(songID);
                  expSetStatus(
                    `Song downloaded, title formatted, and average-normalized to ${lufs} LUFS without changing internal dynamics.`,
                  );
                } catch (writeErr) {
                  expSetStatus(
                    "Normalization finished, but replacing the WAV failed: " +
                      writeErr.message,
                  );
                }
              },
            );
          },
        );
      }

      window.expNormalizeCurrentSong = function () {
        const song = songsDatabase.find((entry) => entry.songID === expState.selectedId);
        if (!song) return alert("Select a song first.");
        const audioInput = document.getElementById("exp-audio");
        const audioRel = normalizeRelPath(audioInput?.value || song.paths?.audio || "");
        if (!audioRel || audioRel === "./") return alert("This song has no audio path yet.");
        const audioAbs = relToAbs(audioRel);
        if (!fs.existsSync(audioAbs)) {
          return alert("Could not find the WAV file at: " + audioRel);
        }
        if (!song.paths) song.paths = {};
        song.paths.audio = audioRel;
        expSetStatus("Manual normalization started for this song...");
        expNormalizeDownloadedSong(song.songID, { audioRel, attempts: 0, manual: true });
      };

      ipcRenderer.on("experimental-download-reply", (event, message) => {
        expSetStatus(message);
        expTryNormalizePendingDownloads(500);
        expTryNormalizePendingDownloads(3000);
      });

      // ==========================================
      // 3. AUTO DOWNLOADER & YOUTUBE SEARCH
      // ==========================================
      let isNewArtist = false;
      function toggleNewArtist() {
        isNewArtist = !isNewArtist;
        const select = document.getElementById("auto-artist-select");
        const input = document.getElementById("auto-new-artist");
        const btn = document.getElementById("btn-toggle-artist");

        if (isNewArtist) {
          select.style.display = "none";
          input.style.display = "block";
          btn.innerText = "Cancel";
          btn.style.color = "#ff0050";
          btn.style.borderColor = "#ff0050";
        } else {
          select.style.display = "block";
          input.style.display = "none";
          btn.innerText = "+ New Artist";
          btn.style.color = "var(--text-main)";
          btn.style.borderColor = "var(--border-strong)";
        }
      }

      let isManualDate = false;
      function toggleManualDate() {
        isManualDate = !isManualDate;
        const dateInput = document.getElementById("auto-release-date");
        if (isManualDate) {
          dateInput.disabled = false;
          dateInput.style.opacity = "1";
        } else {
          dateInput.disabled = true;
          dateInput.style.opacity = "0.5";
        }
      }

      let selectedVideoUrl = "";
      let selectedVideoTitle = "";
      let selectedVideoDate = "";
      let selectedVideoDuration = 0;

      function mockSearchYoutube() {
        const query = document.getElementById("auto-search").value.trim();
        if (!query) return alert("Enter a search term first!");

        const resultsDiv = document.getElementById("auto-search-results");
        resultsDiv.style.display = "block";
        resultsDiv.innerHTML = `<p style="color: var(--text-muted);">Searching YouTube for "${query}"...</p>`;

        ipcRenderer.send("search-youtube", query);
      }

      let selectedVideoThumbnail = "";

      ipcRenderer.on("search-results", (event, response) => {
        const resultsDiv = document.getElementById("auto-search-results");
        if (!resultsDiv) return;
        if (response.error) {
          resultsDiv.innerHTML = `<p style="color: #ff0050;">${response.error}</p>`;
          return;
        }

        let html = `<h3 style="margin-top:0; font-size: 14px;">Top 5 Results:</h3>`;
        response.results.slice(0, 5).forEach((video) => {
          let fDate = video.upload_date
            ? `${video.upload_date.substring(0, 4)}-${video.upload_date.substring(4, 6)}-${video.upload_date.substring(6, 8)}`
            : "";
          let thumb = video.thumbnail || "";
          html += `
            <div style="background: var(--bg-surface); padding: 10px; margin-bottom: 8px; border-radius: 4px; border: 1px solid var(--border-color); cursor: pointer;" 
                 onclick="selectSearchResult('${video.url}', '${video.title.replace(/'/g, "\\'")}', '${fDate}', '${video.duration}', '${thumb}')">
                <div style="font-weight: bold; color: var(--text-main); font-size: 14px; margin-bottom: 4px;">${video.title}</div>
                <div style="font-size: 12px; color: var(--text-muted);">${video.channel} • ${video.duration}</div>
            </div>`;
        });
        resultsDiv.innerHTML = html;
      });

      function selectSearchResult(url, title, date, durationStr, thumbnail) {
        selectedVideoUrl = url;
        selectedVideoTitle = title;
        selectedVideoDate = date;
        selectedVideoDuration = parseDuration(durationStr);
        selectedVideoThumbnail = thumbnail;

        document.getElementById("auto-search").value = url;
        document.getElementById("auto-release-date").value = date;
        document.getElementById("auto-search-results").innerHTML =
          `<p style="color: #4caf50; font-weight: bold;">Selected: ${title}</p>`;
      }

      function triggerAppDownload() {
        const searchInput = document.getElementById("auto-search").value.trim();
        const artistID = document.getElementById("auto-artist-select").value;
        const newArtistName = document
          .getElementById("auto-new-artist")
          .value.trim();
        const releaseDate = document.getElementById("auto-release-date").value;
        const firstListen = document.getElementById("auto-first-listen").value;

        if (!searchInput)
          return alert("Please search and select a YouTube video first.");
        if (isNewArtist && !newArtistName)
          return alert("Please enter a name for the new artist.");

        const genresRaw = document
          .getElementById("auto-genres")
          .value.toLowerCase();
        const tagsRaw = document
          .getElementById("auto-tags")
          .value.toLowerCase();
        const genresArray = genresRaw
          ? genresRaw
              .split(",")
              .map((s) => s.trim())
              .filter((s) => s !== "")
          : [];
        const tagsArray = tagsRaw
          ? tagsRaw
              .split(",")
              .map((s) => s.trim())
              .filter((s) => s !== "")
          : [];

        const appPayload = {
          action: "download_and_add_song",
          youtubeQuery: searchInput,
          artist: isNewArtist
            ? { isNew: true, name: newArtistName }
            : { isNew: false, id: artistID },
          metadata: {
            title: selectedVideoTitle,
            releaseDate: releaseDate,
            firstListenDate: firstListen,
            duration: selectedVideoDuration,
            genres: genresArray,
            tags: tagsArray,
          },
        };

        ipcRenderer.send("send-download-order", appPayload);
        document.getElementById("out-box-1").value =
          "Payload sent to backend! Executing yt-dlp...";
      }

      // ==========================================
      // 4. MANUAL GENERATOR HELPERS
      // ==========================================
      function makeSlug(text) {
        return text
          .toLowerCase()
          .replace(/[^a-z0-9]+/g, "_")
          .replace(/(^_|_$)/g, "");
      }
      function parseDate(rawDate) {
        if (!rawDate) return "";
        let cleaned = rawDate.trim();
        if (cleaned.includes("/")) {
          const parts = cleaned.split("/");
          if (parts.length === 3) return `${parts[2]}-${parts[1]}-${parts[0]}`;
          if (parts.length === 2) return `${parts[1]}-${parts[0]}`;
        }
        return cleaned;
      }
      function parseDuration(rawDur) {
        if (!rawDur) return 0;
        if (rawDur.includes(":")) {
          const parts = rawDur.split(":");
          return parseInt(parts[0]) * 60 + parseInt(parts[1]);
        }
        return parseInt(rawDur) || 0;
      }
      function parseArray(rawString) {
        if (!rawString || !rawString.trim()) return `[]`;
        const arr = rawString
          .split(",")
          .map((s) => s.trim())
          .filter((s) => s !== "");
        return `["${arr.join('", "')}"]`;
      }

      function generateArtistCode() {
        const name = document.getElementById("art-name").value.trim();
        if (!name) return alert("Artist Name is required!");
        const slug = makeSlug(name);
        const artID = `art_${slug}`;
        let out = `{\n  artistID: "${artID}",\n  artist: "${name}",\n`;
        if (document.getElementById("art-start").value)
          out += `  startYear: "${document.getElementById("art-start").value}",\n`;
        if (document.getElementById("art-first").value)
          out += `  firstlistenYear: "${document.getElementById("art-first").value}",\n`;
        if (document.getElementById("art-country").value)
          out += `  country: "${document.getElementById("art-country").value}",\n`;
        out += `\n  genre: ${parseArray(document.getElementById("art-genres").value.toLowerCase())},\n`;
        out += `  tags: ${parseArray(document.getElementById("art-tags").value.toLowerCase())},\n`;
        out += `  members: ${parseArray(document.getElementById("art-members").value)},\n\n`;
        out += `  paths: {\n    cover: "./assets/${slug}/profile.png"\n  }\n},`;
        document.getElementById("out-box-1").value = out;
      }

      function buildTrackFields() {
        const count =
          parseInt(document.getElementById("alb-trackcount").value) || 1;
        const container = document.getElementById("track-fields-container");
        container.innerHTML = `<h3 style="margin-bottom: 12px; font-size: 13px; color: var(--text-muted); text-transform: uppercase; letter-spacing: 1px;">Tracklist Details</h3>`;
        for (let i = 1; i <= count; i++) {
          container.innerHTML += `
            <div class="track-row">
              <div class="track-row-top">
                <span style="color: var(--text-muted); font-weight: bold; width: 25px;">${i}.</span>
                <input type="text" id="trk-title-${i}" class="ctrl-input" placeholder="Song Title" style="flex: 1; margin: 0;">
                <input type="text" id="trk-dur-${i}" class="ctrl-input" placeholder="MM:SS" style="width: 80px; margin: 0;">
              </div>
              <div class="track-row-bottom" style="padding-left: 35px;">
                <input type="text" id="trk-date-${i}" class="ctrl-input" placeholder="Date (Opt. if diff)" style="flex: 1; margin: 0;">
                <input type="text" id="trk-genre-${i}" class="ctrl-input" placeholder="Song Genre" style="flex: 1; margin: 0;">
                <input type="text" id="trk-tags-${i}" class="ctrl-input" placeholder="Song Tags" style="flex: 1; margin: 0;">
              </div>
            </div>`;
        }
      }

      function generateAlbumCode() {
        const title = document.getElementById("alb-title").value.trim();
        const artistID = document.getElementById("alb-artist").value;
        const date = parseDate(document.getElementById("alb-date").value);
        const firstListen = parseDate(
          document.getElementById("alb-firstdate").value,
        );
        const type = document.getElementById("alb-type").value;
        if (!title) return alert("Album title is required!");

        const artistSelect = document.getElementById("alb-artist");
        const artistName =
          artistSelect.options[artistSelect.selectedIndex].text;
        const artistSlug = makeSlug(artistName);
        const albumSlug = makeSlug(title);
        const albID = `alb_${albumSlug}`;

        let albumOut = `{\n  albumID: "${albID}",\n  title: "${title}",\n  artistID: "${artistID}",\n`;
        if (date) albumOut += `  releaseDate: "${date}",\n`;
        if (firstListen) albumOut += `  firstlistenDate: "${firstListen}",\n`;
        albumOut += `  albumType: "${type}",\n\n`;
        albumOut += `  genre: ${parseArray(document.getElementById("alb-genres").value.toLowerCase())},\n`;
        albumOut += `  tags: ${parseArray(document.getElementById("alb-tags").value.toLowerCase())},\n\n`;
        albumOut += `  paths: {\n    cover: "./assets/${artistSlug}/albums/${albumSlug}.png"\n  }\n},`;
        document.getElementById("out-box-1").value = albumOut;

        let songsOut = ``;
        const trackCount =
          parseInt(document.getElementById("alb-trackcount").value) || 1;
        for (let i = 1; i <= trackCount; i++) {
          const tTitle =
            document.getElementById(`trk-title-${i}`).value.trim() ||
            `Track ${i}`;
          const tDur = parseDuration(
            document.getElementById(`trk-dur-${i}`).value,
          );
          const finalSongDate = parseDate(
            document.getElementById(`trk-date-${i}`).value,
          );
          const tGenre = parseArray(
            document.getElementById(`trk-genre-${i}`).value.toLowerCase(),
          );
          const tTags = parseArray(
            document.getElementById(`trk-tags-${i}`).value.toLowerCase(),
          );
          const tSlug = makeSlug(tTitle);
          const songID = `${artistSlug}_${tSlug}`;

          songsOut += `{\n  songID: "${songID}",\n  title: "${tTitle}",\n  artistID: "${artistID}",\n  albumID: "${albID}",\n  track: ${i},\n  releaseDate: "${finalSongDate}",\n`;
          songsOut += `  duration: ${tDur},\n\n  genre: ${tGenre},\n  tags: ${tTags},\n\n`;
          songsOut += `  paths: {\n    audio: "./assets/${artistSlug}/songs/${tSlug}.wav",\n    lyrics: "./assets/${artistSlug}/lyrics/${tSlug}.lrc"\n  }\n},\n`;
        }
        document.getElementById("out-box-2").value = songsOut;
      }

      function copyToClipboard(boxId, btnId) {
        const outputBox = document.getElementById(boxId);
        if (!outputBox.value) return;
        const originalText = document.getElementById(btnId).innerText;
        navigator.clipboard.writeText(outputBox.value).then(() => {
          const copyBtn = document.getElementById(btnId);
          copyBtn.innerText = "Copied!";
          setTimeout(() => {
            copyBtn.innerText = originalText;
          }, 2000);
        });
      }

      // ==========================================
      // 5. BATCH TITLE FORMATTER
      // ==========================================
      function formatTitleCase(text) {
        if (!text) return text;
        const minorWords = [
          "a",
          "an",
          "the",
          "and",
          "but",
          "or",
          "for",
          "nor",
          "on",
          "at",
          "to",
          "from",
          "by",
          "in",
          "of",
          "with",
        ];
        return text
          .toLowerCase()
          .split(" ")
          .map((word, index, arr) => {
            if (
              index === 0 ||
              index === arr.length - 1 ||
              !minorWords.includes(word)
            ) {
              return word.charAt(0).toUpperCase() + word.slice(1);
            }
            return word;
          })
          .join(" ");
      }

      function autoFormatAllTitles() {
        const fs = require("fs");
        const path = require("path");

        const dbFiles = [
          "database_songs.js",
          "database_albums.js",
          "database_artists.js",
        ];

        dbFiles.forEach((fileName) => {
          const filePath = path.join(__dirname, fileName);

          if (fs.existsSync(filePath)) {
            // Read the file exactly as it is (raw text)
            let fileContent = fs.readFileSync(filePath, "utf8");

            // Surgically replace ONLY the text inside title: "x"
            fileContent = fileContent.replace(
              /(title:\s*")([^"]+)(")/g,
              (match, prefix, actualText, suffix) => {
                return prefix + formatTitleCase(actualText) + suffix;
              },
            );

            // (Artist replacement logic removed so artist names remain exactly as you typed them)

            // Save it back with the original formatting untouched
            fs.writeFileSync(filePath, fileContent, "utf8");
          }
        });

        alert(
          "Successfully formatted titles! (Artist names were left untouched)",
        );
      }
    </script>
