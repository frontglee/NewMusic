<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Admin - NewMusic</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      /* Admin-specific layout tweaks */
      body {
        padding: 40px;
        display: flex;
        flex-direction: column;
        gap: 30px;
        height: 100vh;
        box-sizing: border-box;
        background: var(--stage-gradient), var(--bg-main);
        color: var(--text-main);
        overflow: hidden; /* Prevent full body scroll, let panels scroll */
      }

      .admin-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 18px;
        flex-wrap: wrap;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 20px;
      }

      .exp-header-controls {
        display: none;
        flex: 1;
        min-width: 420px;
        align-items: center;
        justify-content: center;
        gap: 16px;
        flex-wrap: wrap;
      }

      body.experimental-admin .exp-header-controls {
        display: flex;
      }

      .exp-header-section-picker,
      .exp-header-actions {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .exp-header-actions {
        justify-content: flex-end;
      }

      .exp-header-lufs {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 7px 10px;
        border: 1px solid var(--border-color);
        border-radius: 20px;
        background: var(--bg-surface);
      }

      .exp-header-lufs label {
        margin: 0;
        color: var(--text-muted);
        font-size: 10px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      .exp-header-controls .tab-btn,
      .exp-header-controls .btn-secondary {
        margin: 0;
        white-space: nowrap;
      }

      .btn-danger {
        background: rgba(255, 0, 80, 0.12);
        color: #ff4f7f;
        border: 1px solid rgba(255, 0, 80, 0.55);
        border-radius: 20px;
        padding: 10px 18px;
        font-weight: 800;
        cursor: pointer;
        transition:
          transform 0.18s ease,
          background-color 0.18s ease,
          border-color 0.18s ease;
      }

      .btn-danger:hover {
        background: rgba(255, 0, 80, 0.22);
        border-color: #ff4f7f;
        transform: translateY(-1px);
      }

      .exp-editor-actions .btn-danger {
        margin-left: auto;
      }

      .admin-container {
        display: flex;
        gap: 40px;
        flex: 1;
        overflow: hidden;
      }

      .form-panel,
      .output-panel {
        flex: 1;
        background-color: var(--bg-elevated);
        padding: 32px;
        border-radius: 12px;
        border: 1px solid var(--border-color);
        overflow-y: auto;
        display: flex;
        flex-direction: column;
        box-shadow: var(--control-shadow);
      }

      /* Custom Panel Scrollbars */
      .form-panel::-webkit-scrollbar,
      .output-panel::-webkit-scrollbar {
        width: 8px;
      }
      .form-panel::-webkit-scrollbar-thumb,
      .output-panel::-webkit-scrollbar-thumb {
        background-color: var(--border-strong);
        border-radius: 10px;
      }

      .output-section {
        display: flex;
        flex-direction: column;
        flex: 1;
        margin-bottom: 24px;
      }

      label {
        display: block;
        margin-top: 20px;
        margin-bottom: 8px;
        color: var(--text-muted);
        font-size: 12px;
        text-transform: uppercase;
        letter-spacing: 1px;
      }

      /* Use standard input styles but make them 100% width */
      .ctrl-input,
      .ctrl-select {
        width: 100%;
        box-sizing: border-box;
      }

      textarea.ctrl-input {
        flex-grow: 1;
        min-height: 200px;
        font-family: "Courier New", Courier, monospace;
        color: var(--accent-color);
        resize: vertical;
        margin-bottom: 15px;
      }

      /* Tabs System */
      .tabs {
        display: flex;
        gap: 12px;
        margin-bottom: 32px;
        border-bottom: 1px solid var(--border-color);
        padding-bottom: 16px;
      }
      .tab-btn {
        padding: 10px 20px;
        border-radius: 20px;
        border: 1px solid var(--border-strong);
        background: transparent;
        color: var(--text-muted);
        cursor: pointer;
        font-weight: bold;
        transition: all 0.2s;
        font-size: 13px;
      }
      .tab-btn:hover {
        border-color: var(--accent-color);
        color: var(--accent-color);
      }
      .tab-btn.active {
        background: var(--accent-color);
        color: var(--accent-contrast);
        border-color: var(--accent-color);
      }

      .tab-content {
        display: none;
      }
      .tab-content.active {
        display: block;
      }

      /* Dynamic Track Rows */
      .track-row {
        display: flex;
        flex-direction: column;
        gap: 12px;
        margin-top: 12px;
        background: var(--bg-surface);
        padding: 16px;
        border-radius: 8px;
        border: 1px solid var(--border-color);
      }
      .track-row-top,
      .track-row-bottom {
        display: flex;
        gap: 12px;
        align-items: center;
      }

      body.experimental-admin .output-panel {
        display: none;
      }

      body.experimental-admin .tabs,
      body.experimental-admin .tab-content {
        display: none;
      }

      body.experimental-admin .form-panel {
        flex: 1 1 100%;
        min-height: 0;
        overflow: hidden;
        padding: 22px;
      }

      body.experimental-admin .admin-container {
        min-height: 0;
      }

      .exp-admin-shell {
        display: flex;
        flex-direction: column;
        gap: 18px;
        height: 100%;
        min-height: 0;
      }

      .exp-admin-toolbar,
      .exp-admin-section-picker,
      .exp-list-controls,
      .exp-editor-actions,
      .exp-type-filter {
        display: flex;
        align-items: center;
        gap: 10px;
        flex-wrap: wrap;
      }

      .exp-admin-toolbar {
        flex: 0 0 auto;
        justify-content: space-between;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border-color);
      }

      .exp-admin-actions {
        display: flex;
        align-items: center;
        justify-content: flex-end;
        gap: 10px;
        flex-wrap: wrap;
      }

      #experimental-workspace {
        width: 100%;
        overflow: hidden;
      }

      .exp-admin-workspace {
        display: grid;
        grid-template-columns: minmax(280px, 360px) minmax(0, 1fr);
        gap: 18px;
        flex: 1;
        width: 100%;
        min-height: 0;
        overflow: hidden;
      }

      .exp-list-panel,
      .exp-editor-panel {
        background: var(--bg-surface);
        border: 1px solid var(--border-color);
        border-radius: 8px;
        padding: 16px;
        min-height: 0;
        overflow: hidden;
      }

      .exp-list-panel {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }

      .exp-list {
        display: flex;
        flex: 1;
        min-height: 0;
        flex-direction: column;
        gap: 8px;
        overflow-y: auto;
        padding-right: 4px;
      }

      .exp-list-item {
        display: grid;
        grid-template-columns: 22px 42px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        min-height: 54px;
        padding: 8px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-elevated);
        cursor: pointer;
        transition:
          border-color 0.18s ease,
          background-color 0.18s ease,
          opacity 0.18s ease,
          transform 0.18s ease;
      }

      .exp-list-item:hover,
      .exp-list-item.active {
        border-color: var(--accent-color);
        background: var(--bg-hover);
      }

      .exp-list-item.exp-dragging,
      .exp-track-row.exp-dragging {
        opacity: 0.45;
        background: var(--bg-selected);
        border-style: dashed;
        cursor: grabbing;
      }

      .exp-list-item.exp-drag-over,
      .exp-track-row.exp-drag-over {
        border-top: 3px solid var(--accent-color);
        box-shadow: 0 -6px 18px var(--accent-soft);
      }

      .exp-drag-handle {
        width: 22px;
        height: 28px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: var(--text-muted);
        font-size: 17px;
        cursor: grab;
        border-radius: 6px;
        user-select: none;
      }

      .exp-drag-handle:hover {
        color: var(--accent-color);
        background: var(--accent-soft);
      }

      .exp-thumb {
        width: 42px;
        height: 42px;
        border-radius: 6px;
        object-fit: cover;
        background: var(--bg-surface-strong);
      }

      .exp-item-title {
        color: var(--text-main);
        font-size: 14px;
        font-weight: 800;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .exp-item-meta {
        color: var(--text-muted);
        font-size: 12px;
        margin-top: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }

      .exp-editor-panel {
        overflow-y: auto;
      }

      .exp-editor-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 14px 16px;
      }

      .exp-editor-grid label {
        margin-top: 0;
      }

      .exp-editor-full {
        grid-column: 1 / -1;
      }

      .exp-image-block {
        display: grid;
        grid-template-columns: 112px 1fr;
        gap: 16px;
        align-items: center;
        margin-bottom: 18px;
      }

      .exp-image-preview {
        width: 112px;
        height: 112px;
        border-radius: 8px;
        object-fit: cover;
        background: var(--bg-surface-strong);
        border: 1px solid var(--border-color);
      }

      .exp-type-filter {
        gap: 8px;
        padding: 8px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-elevated);
      }

      .exp-type-filter label {
        display: flex;
        align-items: center;
        gap: 6px;
        margin: 0;
        color: var(--text-muted);
        font-size: 11px;
        text-transform: none;
        letter-spacing: 0;
      }

      .exp-related-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 24px;
      }

      .exp-related-panel,
      .exp-album-track-panel,
      .exp-album-youtube-panel {
        min-width: 0;
        padding: 14px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-elevated);
      }

      .exp-related-list,
      .exp-compact-track-list,
      .exp-youtube-results-list {
        display: flex;
        flex-direction: column;
        gap: 8px;
        max-height: 420px;
        overflow-y: auto;
        padding-right: 4px;
      }

      .exp-related-card {
        display: grid;
        grid-template-columns: 38px minmax(0, 1fr);
        gap: 10px;
        align-items: center;
        padding: 8px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-surface);
        cursor: pointer;
      }

      .exp-related-card:hover {
        border-color: var(--accent-color);
        background: var(--bg-hover);
      }

      .exp-related-thumb {
        width: 38px;
        height: 38px;
        border-radius: 6px;
        object-fit: cover;
        background: var(--bg-surface-strong);
      }

      .exp-album-tools {
        display: grid;
        grid-template-columns: minmax(260px, 0.9fr) minmax(320px, 1fr);
        gap: 16px;
        align-items: start;
        margin-top: 24px;
      }

      .exp-song-editor-layout {
        display: grid;
        grid-template-columns: minmax(320px, 0.95fr) minmax(340px, 1fr);
        gap: 16px;
        align-items: start;
      }

      .exp-song-fields-panel,
      .exp-lyrics-panel {
        min-width: 0;
        padding: 14px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-elevated);
      }

      .exp-lyrics-panel {
        position: sticky;
        top: 0;
      }

      .exp-lyrics-panel textarea.ctrl-input {
        min-height: 430px;
        height: calc(100vh - 330px);
        max-height: 680px;
        margin-bottom: 0;
      }

      .exp-track-row {
        display: grid;
        grid-template-columns: 22px 34px minmax(0, 1fr) auto;
        gap: 8px;
        align-items: center;
        min-height: 42px;
        padding: 6px 8px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-surface);
        cursor: pointer;
        transition:
          border-color 0.18s ease,
          background-color 0.18s ease,
          opacity 0.18s ease;
      }

      .exp-track-row:hover {
        border-color: var(--accent-color);
        background: var(--bg-hover);
      }

      .exp-track-row .btn-secondary {
        padding: 6px 10px;
        font-size: 12px;
      }

      .exp-youtube-result {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        gap: 10px;
        padding: 8px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-surface);
        cursor: pointer;
      }

      .exp-youtube-result:hover {
        border-color: var(--accent-color);
      }

      .exp-youtube-result.selected {
        border-color: var(--accent-color);
        background: var(--accent-soft);
      }

      .exp-youtube-thumb {
        width: 72px;
        height: 42px;
        border-radius: 4px;
        object-fit: cover;
        background: var(--bg-surface-strong);
      }

      .exp-import-shell {
        width: 100%;
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }

      .exp-import-controls {
        display: grid;
        grid-template-columns: minmax(180px, 1fr) minmax(220px, 1.3fr) auto auto;
        gap: 10px;
        align-items: end;
        padding: 14px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-elevated);
      }

      .exp-external-import-panel {
        display: grid;
        grid-template-columns: minmax(260px, 1fr) auto;
        gap: 12px;
        align-items: center;
        padding: 10px 12px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-elevated);
      }

      .exp-external-import-title {
        display: flex;
        align-items: center;
        gap: 8px;
        min-width: 0;
      }

      .exp-external-import-help {
        color: var(--text-muted);
        font-size: 12px;
        line-height: 1.35;
        margin-top: 4px;
      }

      .exp-external-import-actions {
        display: flex;
        flex-wrap: nowrap;
        gap: 8px;
        align-items: center;
        justify-content: flex-end;
      }

      .exp-external-import-panel textarea {
        min-height: 120px;
        max-height: 220px;
        margin: 0;
        resize: vertical;
      }

      .exp-import-controls label,
      .exp-import-row label,
      .exp-external-import-panel label {
        margin-top: 0;
      }

      .exp-import-list {
        min-height: 0;
        display: flex;
        flex-direction: column;
        gap: 6px;
        overflow-y: auto;
        padding-right: 4px;
      }

      .exp-import-row {
        display: grid;
        grid-template-columns: 24px 72px minmax(220px, 1fr) minmax(240px, 1.1fr);
        gap: 8px;
        align-items: start;
        padding: 8px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-elevated);
      }

      .exp-import-row.searching {
        border-color: var(--accent-color);
        box-shadow: inset 3px 0 0 var(--accent-color);
      }

      .exp-import-row.skipped {
        opacity: 0.58;
      }

      .exp-import-index {
        color: var(--text-muted);
        font-size: 12px;
        font-weight: 800;
        text-align: right;
        padding-top: 2px;
      }

      .exp-import-thumb {
        width: 72px;
        height: 40px;
        border-radius: 4px;
        object-fit: cover;
        background: var(--bg-surface-strong);
        border: 1px solid var(--border-color);
      }

      .exp-import-fields {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
        gap: 6px;
      }

      .exp-import-row .ctrl-input,
      .exp-import-row .ctrl-select {
        padding: 7px 8px;
        font-size: 12px;
      }

      .exp-import-full {
        grid-column: 1 / -1;
      }

      .exp-import-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 6px;
        align-items: center;
      }

      .exp-import-row button {
        padding: 6px 10px !important;
        font-size: 12px !important;
      }

      .exp-import-status {
        display: flex;
        align-items: center;
        gap: 7px;
        min-width: 0;
      }

      .exp-import-status-text {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .exp-import-folder-note {
        color: var(--text-muted);
        font-size: 11px;
        line-height: 1.25;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .exp-import-summary {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 8px;
        color: var(--text-muted);
        font-size: 12px;
        min-height: 18px;
      }

      .exp-import-progress {
        position: relative;
        flex-basis: 100%;
        height: 3px;
        overflow: hidden;
        border-radius: 999px;
        background: var(--bg-surface-strong);
      }

      .exp-import-progress::after {
        content: "";
        position: absolute;
        top: 0;
        bottom: 0;
        width: 34%;
        border-radius: inherit;
        background: var(--accent-color);
        animation: expImportProgress 1s ease-in-out infinite;
      }

      .exp-import-spinner {
        width: 12px;
        height: 12px;
        flex: 0 0 auto;
        border: 2px solid var(--border-color);
        border-top-color: var(--accent-color);
        border-radius: 50%;
        animation: expImportSpin 0.8s linear infinite;
      }

      .exp-import-candidates {
        grid-column: 3 / -1;
        display: flex;
        flex-direction: column;
        gap: 6px;
        padding-top: 2px;
      }

      .exp-import-candidate {
        display: grid;
        grid-template-columns: 72px minmax(0, 1fr);
        gap: 8px;
        align-items: center;
        padding: 6px;
        border: 1px solid var(--border-color);
        border-radius: 8px;
        background: var(--bg-surface);
        cursor: pointer;
      }

      .exp-import-candidate:hover {
        border-color: var(--accent-color);
      }

      .exp-import-candidate.selected {
        border-color: var(--accent-color);
        background: var(--accent-soft);
      }

      @keyframes expImportSpin {
        to {
          transform: rotate(360deg);
        }
      }

      @keyframes expImportProgress {
        0% {
          left: -34%;
        }
        100% {
          left: 100%;
        }
      }

      @media (max-width: 980px) {
        .exp-admin-workspace {
          grid-template-columns: 1fr;
        }

        .exp-editor-grid,
        .exp-image-block,
        .exp-related-grid,
        .exp-album-tools,
        .exp-song-editor-layout,
        .exp-import-controls,
        .exp-import-row,
        .exp-import-fields,
        .exp-external-import-panel {
          grid-template-columns: 1fr;
        }

        .exp-import-candidates {
          grid-column: 1;
        }

        .exp-header-controls {
          min-width: 100%;
          justify-content: flex-start;
        }

        .exp-lyrics-panel {
          position: static;
        }
      }
    </style>
  </head>
  <body class="admin-page experimental-admin">
    <script>
      const ADMIN_THEME_CLASSES = [
        "theme-neon",
        "theme-midnight",
        "theme-rose",
        "theme-light",
        "theme-graphite",
        "theme-dusk",
        "theme-fresh",
      ];
      const savedAdminTheme = localStorage.getItem("appTheme");
      if (
        savedAdminTheme &&
        savedAdminTheme !== "default" &&
        ADMIN_THEME_CLASSES.includes(savedAdminTheme)
      ) {
        document.body.classList.add(savedAdminTheme);
      }
    </script>
    <script src="database_artists.js"></script>
    <script src="database_albums.js"></script>
    <script src="database_songs.js"></script>

    <header class="admin-header">
      <div style="display: flex; align-items: center; gap: 16px">
        <svg
          class="icon"
          style="width: 28px; height: 28px; color: var(--text-main)"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="2"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <circle cx="12" cy="12" r="3"></circle>
          <path
            d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"
          ></path>
        </svg>
        <h1 style="margin: 0; font-size: 24px">NewMusic Database Admin</h1>
      </div>
      <a href="index.html" class="btn-secondary" style="text-decoration: none"
        >← Back to Player</a
      >
    </header>

    <div class="admin-container">
      <div class="form-panel">
        <div class="exp-admin-shell">
          <div id="exp-status" style="min-height:18px; color:var(--text-muted); font-size:12px;"></div>
          <div id="experimental-workspace" style="display:flex; flex:1; min-height:0; align-items:center; justify-content:center; color:var(--text-muted);">
            Choose Artists, Albums, or Songs to start.
          </div>
        </div>
      </div>
    </div>

    <script>
      // ==========================================
      // 0. PREVENT ACCIDENTAL BACK NAVIGATION
      // ==========================================
      // Trap the history state so 'Back' actions do nothing
      history.pushState(null, null, location.href);
      window.addEventListener("popstate", function () {
        history.pushState(null, null, location.href);
      });

      // Explicitly block side mouse buttons (Button 3 = Back, Button 4 = Forward)
      window.addEventListener("mousedown", function (e) {
        if (e.button === 3 || e.button === 4) {
          e.preventDefault();
        }
      });

      document.body.classList.toggle(
        "tips-enabled",
        localStorage.getItem("isTipsMode") !== "false",
      );

      // ==========================================
      // 1. ELECTRON BACKEND CONNECTION & UI MODALS
      // ==========================================
      const { ipcRenderer, shell } = require("electron");
      const { exec } = require("child_process");
      const path = require("path");
      const fs = require("fs");
      const os = require("os");
      const childProcess = require("child_process");

      // Function to launch the batch script in a new terminal
      window.runBatchScript = function () {
        // __dirname resolves to the current folder of this HTML file
        const batPath = path.join(__dirname, "SONG_DOWNLOAD.bat");

        // 'start ""' tells Windows to open a new interactive command prompt window
        exec(`start "" "${batPath}"`, (error) => {
          if (error) {
            alert("Failed to launch script: " + error.message);
          }
        });
      };

      // Inject custom NewMusic Alert Modal
      window.showCustomAlert = function (msg) {
        const existing = document.getElementById("custom-app-modal");
        if (existing) existing.remove();

        const overlay = document.createElement("div");
        overlay.id = "custom-app-modal";
        overlay.style.cssText =
          "position:fixed; top:0; left:0; width:100vw; height:100vh; background:rgba(0,0,0,0.8); z-index:999999; display:flex; justify-content:center; align-items:center; backdrop-filter: blur(4px);";

        overlay.innerHTML = `
              <div class="modal-box" style="width:360px; padding: 28px; text-align: center;">
                  <p style="color: var(--text-main); margin: 0 0 24px 0; font-size: 15px; font-weight: 500; line-height: 1.5;">${msg}</p>
                  <button class="btn-primary" style="justify-content: center; width: 100%; padding: 12px;" onclick="document.getElementById('custom-app-modal').remove()">OK</button>
              </div>
          `;
        document.body.appendChild(overlay);
      };

      // Override native alert globally for the Admin tool
      window.alert = window.showCustomAlert;

      ipcRenderer.on("backend-reply", (event, message) => {
        document.getElementById("out-box-1").value = message;
        alert(message); // This will now use the sleek custom modal!
      });

      // ==========================================
      // 2. INITIALIZATION & TAB SWITCHING
      // ==========================================
      window.onload = () => {
        // Experimental admin is now the only/default admin interface.
        localStorage.removeItem("isAutoDLMode");
        localStorage.setItem("isExperimentalMode", "true");
        initExperimentalAdmin();
      };

      function switchTab(tab) {
        ["artist", "album", "auto"].forEach((t) => {
          document.getElementById("tab-" + t).classList.remove("active");
          document.getElementById("btn-tab-" + t).classList.remove("active");
        });

        document.getElementById("tab-" + tab).classList.add("active");
        document.getElementById("btn-tab-" + tab).classList.add("active");

        if (tab === "artist") {
          document.getElementById("section-out-2").style.display = "none";
          document.getElementById("title-out-1").innerText = "Artist Code";
          document.getElementById("btn-copy-1").innerText = "Copy Artist Code";
        } else if (tab === "album") {
          document.getElementById("section-out-2").style.display = "flex";
          document.getElementById("title-out-1").innerText = "Album Code";
          document.getElementById("btn-copy-1").innerText = "Copy Album Code";
        } else if (tab === "auto") {
          document.getElementById("section-out-2").style.display = "none";
          document.getElementById("title-out-1").innerText = "App Console";
          document.getElementById("btn-copy-1").innerText = "Copy Logs";
        }
      }

      // ==========================================
      // EXPERIMENTAL DATABASE MANAGER
      // ==========================================
      const expState = {
        section: null,
        selectedId: null,
        search: "",
        albumTypeFilter: ["album", "ep", "single", "compilation"],
        dragId: null,
        trackDragId: null,
        youtubeResult: null,
        lastArtistID: null,
        lastAlbumID: null,
      };

      const spotifyImportState = {
        playlistUrl: "",
        tracks: [],
        activeRowId: null,
        searching: false,
        downloading: false,
        cancelRequested: false,
        downloadCancelRequested: false,
        searchRunId: 0,
      };

      const externalPlaylistImportWatch = {
        timer: null,
        startedAt: 0,
      };

      function expIsSpotifyImportEnabled() {
        return localStorage.getItem("isSpotifyPlaylistImportEnabled") === "true";
      }

      const EXP_SECTIONS = {
        artists: {
          label: "Artists",
          idKey: "artistID",
          titleKey: "artist",
          file: "database_artists.js",
          varName: "artistsDatabase",
          data: () => artistsDatabase,
        },
        albums: {
          label: "Albums",
          idKey: "albumID",
          titleKey: "title",
          file: "database_albums.js",
          varName: "albumsDatabase",
          data: () => albumsDatabase,
        },
        songs: {
          label: "Songs",
          idKey: "songID",
          titleKey: "title",
          file: "database_songs.js",
          varName: "songsDatabase",
          data: () => songsDatabase,
        },
      };

      const EXP_ALBUM_TYPE_OPTIONS = [
        { value: "album", label: "Albums" },
        { value: "ep", label: "EPs" },
        { value: "single", label: "Singles" },
        { value: "compilation", label: "Compilations" },
      ];

      function escapeHtml(value) {
        return String(value ?? "")
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      function escapeAttr(value) {
        return escapeHtml(value).replace(/`/g, "&#096;");
      }

      function csvToArray(value, lowercase = true) {
        return String(value || "")
          .split(",")
          .map((item) => item.trim())
          .filter(Boolean)
          .map((item) => (lowercase ? item.toLowerCase() : item));
      }

      function arrayToCsv(value) {
        return Array.isArray(value) ? value.join(", ") : "";
      }

      function relToAbs(relPath) {
        return path.join(__dirname, String(relPath || "").replace(/^\.\//, ""));
      }

      function normalizeRelPath(relPath) {
        return (
          "./" +
          String(relPath || "")
            .replace(/\\/g, "/")
            .replace(/^\.\//, "")
        );
      }

      function getArtistById(artistID) {
        return artistsDatabase.find((artist) => artist.artistID === artistID);
      }

      function getAlbumById(albumID) {
        return albumsDatabase.find((album) => album.albumID === albumID);
      }

      function getArtistSlugFromArtist(artist) {
        const cover = artist?.paths?.cover || "";
        const match = cover.match(/\.\/assets\/([^/]+)\//);
        return match
          ? match[1]
          : String(artist?.artistID || "").replace(/^art_/, "");
      }

      function getArtistSlugById(artistID) {
        return (
          getArtistSlugFromArtist(getArtistById(artistID)) ||
          String(artistID || "").replace(/^art_/, "")
        );
      }

      function getItemImage(section, item) {
        if (!item) return "./logo.png";
        if (section === "songs") {
          const album = getAlbumById(item.albumID);
          return album?.paths?.cover || "./logo.png";
        }
        return item.paths?.cover || "./logo.png";
      }

      function getItemMeta(section, item) {
        if (section === "artists") {
          return (
            [item.country, arrayToCsv(item.genre)]
              .filter(Boolean)
              .join(" | ") || item.artistID
          );
        }
        if (section === "albums") {
          const artist = getArtistById(item.artistID);
          return (
            [artist?.artist, item.releaseDate, item.albumType]
              .filter(Boolean)
              .join(" | ") || item.albumID
          );
        }
        const artist = getArtistById(item.artistID);
        const album = getAlbumById(item.albumID);
        return (
          [
            artist?.artist,
            album?.title,
            item.track ? `Track ${item.track}` : "",
          ]
            .filter(Boolean)
            .join(" | ") || item.songID
        );
      }

      function expWriteDatabase(file, varName, data) {
        const filePath = path.join(__dirname, file);
        fs.writeFileSync(
          filePath,
          `const ${varName} = ${JSON.stringify(data, null, 2)};\n`,
          "utf8",
        );
      }

      function expBuildDatabaseStrings() {
        expSortSongsForDatabaseStorage();
        return {
          "database_artists.js": `const artistsDatabase = ${JSON.stringify(artistsDatabase, null, 2)};\n`,
          "database_albums.js": `const albumsDatabase = ${JSON.stringify(albumsDatabase, null, 2)};\n`,
          "database_songs.js": `const songsDatabase = ${JSON.stringify(songsDatabase, null, 2)};\n`,
        };
      }

      function expSendDeleteWithAssets(filesToDelete, foldersToDelete, message) {
        ipcRenderer.send("execute-nuclear-delete", {
          filesToDelete: [...new Set(filesToDelete.filter(Boolean))],
          foldersToDelete: [...new Set(foldersToDelete.filter(Boolean))],
          databases: expBuildDatabaseStrings(),
        });
        const log = document.getElementById("exp-status");
        if (log) log.textContent = message;
      }

      function expSortSongsForDatabaseStorage() {
        const albumOrder = new Map(
          albumsDatabase.map((album, index) => [album.albumID, index]),
        );
        const originalOrder = new Map(
          songsDatabase.map((song, index) => [song.songID, index]),
        );
        songsDatabase.sort((a, b) => {
          const albumA = albumOrder.has(a.albumID)
            ? albumOrder.get(a.albumID)
            : Number.MAX_SAFE_INTEGER;
          const albumB = albumOrder.has(b.albumID)
            ? albumOrder.get(b.albumID)
            : Number.MAX_SAFE_INTEGER;
          if (albumA !== albumB) return albumA - albumB;
          const trackA = parseInt(a.track, 10) || 0;
          const trackB = parseInt(b.track, 10) || 0;
          if (trackA !== trackB) return trackB - trackA;
          return (
            (originalOrder.get(a.songID) || 0) -
            (originalOrder.get(b.songID) || 0)
          );
        });
      }

      function expSaveDatabases(message = "Experimental database saved.") {
        expSortSongsForDatabaseStorage();
        expWriteDatabase(
          "database_artists.js",
          "artistsDatabase",
          artistsDatabase,
        );
        expWriteDatabase(
          "database_albums.js",
          "albumsDatabase",
          albumsDatabase,
        );
        expWriteDatabase("database_songs.js", "songsDatabase", songsDatabase);
        const log = document.getElementById("exp-status");
        if (log) log.textContent = message;
      }

      function expEnsureArtistFolders(slug) {
        const artistDir = path.join(__dirname, "assets", slug);
        ["songs", "lyrics", "albums"].forEach((folder) => {
          fs.mkdirSync(path.join(artistDir, folder), { recursive: true });
        });
        const profilePath = path.join(artistDir, "profile.png");
        if (!fs.existsSync(profilePath)) {
          const logoPath = path.join(__dirname, "logo.png");
          if (fs.existsSync(logoPath)) fs.copyFileSync(logoPath, profilePath);
        }
      }

      function expUniqueSlug(name, takenIds, prefix = "") {
        const base = makeSlug(name) || "untitled";
        let slug = base;
        let index = 2;
        while (takenIds.has(prefix + slug)) {
          slug = `${base}_${index}`;
          index++;
        }
        return slug;
      }

      function expAskText(message, defaultValue = "") {
        return new Promise((resolve) => {
          const existing = document.getElementById("exp-text-modal");
          if (existing) existing.remove();

          const overlay = document.createElement("div");
          overlay.id = "exp-text-modal";
          overlay.style.cssText =
            "position:fixed; inset:0; background:rgba(0,0,0,0.78); z-index:999999; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);";
          overlay.innerHTML = `
            <div class="modal-box" style="width:420px; max-width:calc(100vw - 40px); padding:24px;">
              <p style="color:var(--text-main); margin:0 0 14px; font-size:15px; font-weight:700;">${escapeHtml(message)}</p>
              <input id="exp-text-modal-input" class="ctrl-input" type="text" value="${escapeAttr(defaultValue)}" style="width:100%; margin:0 0 18px;">
              <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="exp-text-modal-cancel" class="btn-secondary" style="margin:0; padding:10px 18px;">Cancel</button>
                <button id="exp-text-modal-ok" class="btn-primary" style="margin:0; padding:10px 18px;">Create</button>
              </div>
            </div>`;
          document.body.appendChild(overlay);

          const input = document.getElementById("exp-text-modal-input");
          const close = (value) => {
            overlay.remove();
            resolve(value);
          };
          document
            .getElementById("exp-text-modal-cancel")
            .addEventListener("click", () => close(null));
          document
            .getElementById("exp-text-modal-ok")
            .addEventListener("click", () => close(input.value.trim()));
          input.addEventListener("keydown", (event) => {
            if (event.key === "Enter") close(input.value.trim());
            if (event.key === "Escape") close(null);
          });
          setTimeout(() => input.focus(), 0);
        });
      }

      function expAskConfirm(
        message,
        title = "Confirm delete",
        requiredText = "",
      ) {
        return new Promise((resolve) => {
          const existing = document.getElementById("exp-confirm-modal");
          if (existing) existing.remove();

          const required = String(requiredText || "").trim();
          const overlay = document.createElement("div");
          overlay.id = "exp-confirm-modal";
          overlay.style.cssText =
            "position:fixed; inset:0; background:rgba(0,0,0,0.82); z-index:999999; display:flex; align-items:center; justify-content:center; backdrop-filter:blur(4px);";
          overlay.innerHTML = `
            <div class="modal-box" style="width:480px; max-width:calc(100vw - 40px); padding:24px; border:1px solid rgba(255,0,80,0.45);">
              <h3 style="color:#ff4f7f; margin:0 0 12px; font-size:17px;">${escapeHtml(title)}</h3>
              <p style="color:var(--text-main); margin:0 0 10px; font-size:15px; line-height:1.45;">${escapeHtml(message)}</p>
              <p style="color:var(--text-muted); margin:0 0 14px; font-size:12px; line-height:1.45;">This removes the database entries and the related files in ./assets/. This cannot be undone.</p>
              ${
                required
                  ? `
                <label style="margin-top:0; color:#ff8aa8;">Type this exactly to confirm</label>
                <div style="font-size:13px; font-weight:800; color:var(--text-main); background:var(--bg-surface); border:1px solid rgba(255,0,80,0.35); border-radius:8px; padding:10px 12px; margin-bottom:10px; user-select:text;">${escapeHtml(required)}</div>
                <input id="exp-confirm-input" class="ctrl-input" type="text" autocomplete="off" placeholder="Type the exact name here..." style="width:100%; margin:0 0 18px; border-color:rgba(255,0,80,0.35);">
              `
                  : ""
              }
              <div style="display:flex; gap:10px; justify-content:flex-end;">
                <button id="exp-confirm-cancel" class="btn-secondary" style="margin:0; padding:10px 18px;">Cancel</button>
                <button id="exp-confirm-delete" class="btn-danger" style="margin:0; ${required ? "opacity:0.45; cursor:not-allowed;" : ""}" ${required ? "disabled" : ""}>Delete</button>
              </div>
            </div>`;
          document.body.appendChild(overlay);

          const input = document.getElementById("exp-confirm-input");
          const deleteBtn = document.getElementById("exp-confirm-delete");
          const close = (value) => {
            overlay.remove();
            resolve(value);
          };
          const updateDeleteState = () => {
            if (!required || !input || !deleteBtn) return;
            const matches = input.value.trim() === required;
            deleteBtn.disabled = !matches;
            deleteBtn.style.opacity = matches ? "1" : "0.45";
            deleteBtn.style.cursor = matches ? "pointer" : "not-allowed";
          };
          document
            .getElementById("exp-confirm-cancel")
            .addEventListener("click", () => close(false));
          deleteBtn.addEventListener("click", () => {
            if (required && (!input || input.value.trim() !== required)) return;
            close(true);
          });
          if (input) {
            input.addEventListener("input", updateDeleteState);
            input.addEventListener("keydown", (event) => {
              if (event.key === "Enter" && input.value.trim() === required)
                close(true);
              if (event.key === "Escape") close(false);
            });
            setTimeout(() => input.focus(), 0);
            updateDeleteState();
          }
          overlay.addEventListener("click", (event) => {
            if (event.target === overlay) close(false);
          });
          window.addEventListener("keydown", function onKey(event) {
            if (!document.getElementById("exp-confirm-modal")) {
              window.removeEventListener("keydown", onKey);
              return;
            }
            if (event.key === "Escape") {
              window.removeEventListener("keydown", onKey);
              close(false);
            }
          });
        });
      }

      function initExperimentalAdmin() {
        document.body.classList.add("experimental-admin");
        const outputPanel = document.querySelector(".output-panel");
        if (outputPanel) outputPanel.style.display = "none";

        const header = document.querySelector(".admin-header");
        if (header && !document.getElementById("exp-header-controls")) {
          const headerControls = document.createElement("div");
          headerControls.id = "exp-header-controls";
          headerControls.className = "exp-header-controls";
          headerControls.innerHTML = `
            <div class="exp-header-section-picker">
              <button class="tab-btn" id="exp-section-artists" onclick="expSelectSection('artists')">Artists</button>
              <button class="tab-btn" id="exp-section-albums" onclick="expSelectSection('albums')">Albums</button>
              <button class="tab-btn" id="exp-section-songs" onclick="expSelectSection('songs')">Songs</button>
              ${expIsSpotifyImportEnabled() ? `<button class="tab-btn" id="exp-section-spotify-import" onclick="expSelectSection('spotify-import')">Playlist Import</button>` : ""}
            </div>
          `;
          const backLink = header.querySelector('a[href="index.html"]');
          header.insertBefore(headerControls, backLink || null);
        }

        const formPanel = document.querySelector(".form-panel");
        if (!formPanel) return;

        formPanel.innerHTML = `
          <div class="exp-admin-shell">
            <div id="exp-status" style="min-height:18px; color:var(--text-muted); font-size:12px;"></div>
            <div id="experimental-workspace" style="display:flex; flex:1; min-height:0; align-items:center; justify-content:center; color:var(--text-muted);">
              Choose Artists, Albums, or Songs to start.
            </div>
          </div>
        `;
      }

      window.expSelectSection = function (section) {
        expState.section = section;
        expState.selectedId = null;
        expState.search = "";
        expState.youtubeResult = null;
        renderExperimentalSection();
      };

      function renderExperimentalSection() {
        const section = expState.section;
        Object.keys(EXP_SECTIONS).forEach((key) => {
          const btn = document.getElementById(`exp-section-${key}`);
          if (btn) btn.classList.toggle("active", key === section);
        });
        const importBtn = document.getElementById("exp-section-spotify-import");
        if (importBtn) importBtn.classList.toggle("active", section === "spotify-import");
        if (section === "spotify-import") {
          if (!expIsSpotifyImportEnabled()) {
            const workspace = document.getElementById("experimental-workspace");
            if (workspace) {
              workspace.style.alignItems = "center";
              workspace.style.justifyContent = "center";
              workspace.style.color = "var(--text-muted)";
              workspace.innerHTML = "Enable Playlist Import in Settings first.";
            }
            return;
          }
          renderSpotifyImportSection();
          return;
        }
        const cfg = EXP_SECTIONS[section];
        if (!cfg) return;
        const workspace = document.getElementById("experimental-workspace");
        if (!workspace) return;
        workspace.style.alignItems = "stretch";
        workspace.style.justifyContent = "stretch";
        workspace.style.color = "";
        workspace.style.overflow = "hidden";
        workspace.innerHTML = `
          <div class="exp-admin-workspace">
            <div class="exp-list-panel">
              <div class="exp-list-controls">
                <input id="exp-search" class="ctrl-input" type="text" placeholder="Search ${cfg.label.toLowerCase()}..." value="${escapeAttr(expState.search)}" oninput="expSetSearch(this.value)" style="margin:0; flex:1;">
                <button class="btn-secondary" style="margin:0; padding:10px 14px;" onclick="expCreateItem()">New</button>
              </div>
              ${section === "albums" ? renderAlbumTypeFilters() : ""}
              <div id="exp-list" class="exp-list"></div>
            </div>
            <div id="exp-editor" class="exp-editor-panel"></div>
          </div>
        `;
        const formPanel = document.querySelector(".form-panel");
        if (formPanel) formPanel.scrollTop = 0;
        renderExperimentalList();
        renderExperimentalEditor();
      }

      function renderAlbumTypeFilters() {
        const selected = new Set(expState.albumTypeFilter);
        return `
          <div class="exp-type-filter">
            ${EXP_ALBUM_TYPE_OPTIONS.map(
              (type) => `
              <label>
                <input type="checkbox" ${selected.has(type.value) ? "checked" : ""} onchange="expToggleAlbumType('${type.value}', this.checked)">
                ${type.label}
              </label>
            `,
            ).join("")}
          </div>`;
      }

      window.expToggleAlbumType = function (type, checked) {
        const current = new Set(expState.albumTypeFilter);
        if (checked) current.add(type);
        else current.delete(type);
        expState.albumTypeFilter = EXP_ALBUM_TYPE_OPTIONS.map(
          (option) => option.value,
        ).filter((value) => current.has(value));
        renderExperimentalList();
      };

      window.expSetSearch = function (value) {
        expState.search = value;
        renderExperimentalList();
      };

      function getFilteredExperimentalItems() {
        const cfg = EXP_SECTIONS[expState.section];
        if (!cfg) return [];
        const term = expState.search.trim().toLowerCase();
        return cfg.data().filter((item) => {
          if (expState.section === "albums") {
            const type = String(item.albumType || "album").toLowerCase();
            if (!expState.albumTypeFilter.includes(type)) return false;
          }
          if (!term) return true;
          return [
            item[cfg.idKey],
            item[cfg.titleKey],
            getItemMeta(expState.section, item),
          ]
            .join(" ")
            .toLowerCase()
            .includes(term);
        });
      }

      function renderExperimentalList() {
        const cfg = EXP_SECTIONS[expState.section];
        const list = document.getElementById("exp-list");
        if (!cfg || !list) return;
        const items = getFilteredExperimentalItems();
        if (items.length === 0) {
          list.innerHTML = `<div style="color:var(--text-muted); font-size:13px;">No ${cfg.label.toLowerCase()} found.</div>`;
          return;
        }
        list.innerHTML = items
          .map((item) => {
            const id = item[cfg.idKey];
            return `
            <div class="exp-list-item ${id === expState.selectedId ? "active" : ""}" draggable="true" ondragstart="expStartDrag(event, '${escapeAttr(id)}')" ondragover="expDragOver(event, this)" ondragleave="expDragLeave(this)" ondrop="expDropItem(event, '${escapeAttr(id)}', this)" ondragend="expDragEnd()" onclick="expSelectItem('${escapeAttr(id)}')">
              <div class="exp-drag-handle" title="Drag to reorder">☰</div>
              <img class="exp-thumb" src="${escapeAttr(getItemImage(expState.section, item))}?v=${Date.now()}" onerror="this.src='./logo.png'">
              <div style="min-width:0;">
                <div class="exp-item-title">${escapeHtml(item[cfg.titleKey])}</div>
                <div class="exp-item-meta">${escapeHtml(getItemMeta(expState.section, item))}</div>
              </div>
            </div>`;
          })
          .join("");
      }

      window.expSelectItem = function (id) {
        expState.selectedId = id;
        expState.youtubeResult = null;
        if (expState.section === "artists") expState.lastArtistID = id;
        if (expState.section === "albums") {
          expState.lastAlbumID = id;
          const album = getAlbumById(id);
          if (album?.artistID) expState.lastArtistID = album.artistID;
        }
        if (expState.section === "songs") {
          const song = songsDatabase.find((entry) => entry.songID === id);
          if (song?.albumID) expState.lastAlbumID = song.albumID;
          if (song?.artistID) expState.lastArtistID = song.artistID;
        }
        renderExperimentalList();
        renderExperimentalEditor();
      };

      function renderExperimentalEditor() {
        const cfg = EXP_SECTIONS[expState.section];
        const editor = document.getElementById("exp-editor");
        if (!cfg || !editor) return;
        const item = cfg
          .data()
          .find((entry) => entry[cfg.idKey] === expState.selectedId);
        if (!item) {
          editor.innerHTML = `<div style="height:100%; display:flex; align-items:center; justify-content:center; color:var(--text-muted);">Select a ${cfg.label.slice(0, -1).toLowerCase()} to edit.</div>`;
          return;
        }
        if (expState.section === "artists") renderArtistEditor(item, editor);
        if (expState.section === "albums") renderAlbumEditor(item, editor);
        if (expState.section === "songs") renderSongEditor(item, editor);
      }

      function expField(id, label, value, span = "") {
        return `<div class="${span}"><label>${label}</label><input id="${id}" class="ctrl-input" type="text" value="${escapeAttr(value)}"></div>`;
      }

      function expSelectField(id, label, value, options) {
        return `<div><label>${label}</label><select id="${id}" class="ctrl-select">${options.map((opt) => `<option value="${escapeAttr(opt.value)}" ${opt.value === value ? "selected" : ""}>${escapeHtml(opt.label)}</option>`).join("")}</select></div>`;
      }

      function renderImageBlock(section, item, id, label) {
        const image = getItemImage(section, item);
        return `
          <div class="exp-image-block">
            <img class="exp-image-preview" src="${escapeAttr(image)}?v=${Date.now()}" onerror="this.src='./logo.png'">
            <div>
              <label style="margin-top:0;">${label}</label>
              <input class="ctrl-input" type="file" accept="image/*" onchange="expUploadImage('${section}', '${escapeAttr(id)}', this)">
              <div style="color:var(--text-muted); font-size:12px; margin-top:8px;">Uploads are cropped and saved as 1200x1200 PNG.</div>
            </div>
          </div>`;
      }

      function expFindArtistByName(name) {
        const slug = makeSlug(name || "");
        if (!slug) return null;
        return artistsDatabase.find((artist) => makeSlug(artist.artist) === slug);
      }

      function expTodayIso() {
        const now = new Date();
        const month = String(now.getMonth() + 1).padStart(2, "0");
        const day = String(now.getDate()).padStart(2, "0");
        return `${now.getFullYear()}-${month}-${day}`;
      }

      function expFormatViews(value) {
        const count = Number(value || 0);
        return count ? `${count.toLocaleString()} views` : "views unknown";
      }

      function expGetSpotifyImportRow(rowId) {
        return spotifyImportState.tracks.find((row) => row.id === rowId);
      }

      function expBuildSpotifyImportRow(track, index) {
        const artists = Array.isArray(track.artists) ? track.artists : [];
        const primaryArtist = artists[0] || "Unknown Artist";
        const matchedArtist = expFindArtistByName(primaryArtist);
        return {
          id: `spotify_${Date.now()}_${index}`,
          title: track.title || "Unknown Title",
          artists,
          artistID: matchedArtist?.artistID || "",
          artistName: matchedArtist?.artist || primaryArtist,
          isNewArtist: !matchedArtist,
          releaseDate: track.releaseDate || "",
          duration: Math.round((track.durationMs || 0) / 1000),
          spotifyUrl: track.spotifyUrl || "",
          youtubeQuery: [track.title, artists.join(" ")].filter(Boolean).join(" "),
          youtubeResults: [],
          selectedVideo: null,
          skipped: false,
          status: "queued",
          songID: "",
          albumID: "",
        };
      }

      function renderSpotifyImportSection() {
        const workspace = document.getElementById("experimental-workspace");
        if (!workspace) return;
        workspace.style.alignItems = "stretch";
        workspace.style.justifyContent = "stretch";
        workspace.style.color = "";
        workspace.style.overflow = "hidden";
        workspace.innerHTML = `
          <div class="exp-import-shell">
            <div class="exp-external-import-panel">
              <div style="min-width:0;">
                <div class="exp-external-import-title">
                  <label>Exportify Auto Import</label>
                  <span id="exp-exportify-watch-pill"></span>
                </div>
                <div class="exp-external-import-help">Opens Exportify, watches Downloads for the exported CSV, then builds the YouTube review queue automatically.</div>
              </div>
              <div class="exp-external-import-actions">
                <button id="exp-exportify-auto-btn" class="btn-primary" style="margin:0;" onclick="expStartExternalPlaylistWatch()">Exportify + Auto Import</button>
                <button id="exp-playlist-cancel-btn" class="btn-secondary" style="margin:0;" onclick="expCancelSpotifyImportWork()">Cancel</button>
                <button id="exp-spotify-download-btn" class="btn-primary" style="margin:0;" onclick="expDownloadSpotifyImport()" disabled>Download All</button>
              </div>
            </div>
            <div id="exp-spotify-import-summary" class="exp-import-summary"></div>
            <div id="exp-spotify-import-list" class="exp-import-list"></div>
          </div>
        `;
        renderSpotifyImportRows();
      }

      function renderSpotifyImportRows() {
        const list = document.getElementById("exp-spotify-import-list");
        const summary = document.getElementById("exp-spotify-import-summary");
        const downloadBtn = document.getElementById("exp-spotify-download-btn");
        const cancelBtn = document.getElementById("exp-playlist-cancel-btn");
        const autoBtn = document.getElementById("exp-exportify-auto-btn");
        const watchPill = document.getElementById("exp-exportify-watch-pill");
        if (!list || !summary) return;

        const rows = spotifyImportState.tracks;
        const activeRows = rows.filter((row) => !row.skipped);
        const activeDownloadRows = activeRows.filter(
          (row) => row.status !== "sent" && row.status !== "downloading",
        );
        const selectedCount = activeRows.filter((row) => row.selectedVideo).length;
        const downloadableCount = activeDownloadRows.filter((row) => row.selectedVideo).length;
        const newArtistCount = activeRows.filter((row) => row.isNewArtist).length;
        const unresolvedCount = activeDownloadRows.filter((row) => !row.selectedVideo).length;
        const sentCount = activeRows.filter((row) => row.status === "sent" || row.status === "downloading").length;
        const isWatching = Boolean(externalPlaylistImportWatch.timer);
        const isBusy = isWatching || spotifyImportState.searching || spotifyImportState.downloading;
        const canDownload =
          rows.length > 0 &&
          activeDownloadRows.length > 0 &&
          downloadableCount > 0 &&
          unresolvedCount === 0 &&
          !spotifyImportState.searching &&
          !spotifyImportState.downloading;
        let summaryText = rows.length
          ? `${rows.length} tracks loaded. ${selectedCount}/${activeRows.length} ready. ${newArtistCount} new artist folders.`
          : "No playlist loaded.";
        if (isWatching) summaryText = "Waiting for the Exportify CSV in Downloads...";
        else if (spotifyImportState.searching) {
          summaryText = spotifyImportState.cancelRequested
            ? "Cancelling playlist search..."
            : `Matching YouTube results... ${selectedCount}/${activeRows.length} ready.`;
        } else if (spotifyImportState.downloading) {
          summaryText = spotifyImportState.downloadCancelRequested
            ? "Cancelling remaining downloads..."
            : `Starting downloads... ${sentCount}/${activeRows.length} sent.`;
        } else if (rows.length && unresolvedCount) {
          summaryText = `${unresolvedCount} track${unresolvedCount === 1 ? "" : "s"} still need a selected YouTube result or a skip.`;
        } else if (canDownload) {
          summaryText = "Review complete. Download is ready.";
        } else if (rows.length && sentCount) {
          summaryText = `${sentCount} playlist download${sentCount === 1 ? "" : "s"} started.`;
        }

        summary.innerHTML = `
          ${isBusy ? `<span class="exp-import-spinner"></span>` : ""}
          <span>${escapeHtml(summaryText)}</span>
          ${isBusy ? `<div class="exp-import-progress" style="width:100%;"></div>` : ""}
        `;
        if (downloadBtn) {
          downloadBtn.disabled = !canDownload;
          downloadBtn.textContent = spotifyImportState.downloading
            ? "Downloading..."
            : canDownload
              ? `Download ${downloadableCount}`
              : "Download All";
          downloadBtn.style.opacity = downloadBtn.disabled ? "0.45" : "1";
        }
        if (cancelBtn) {
          cancelBtn.disabled = !isBusy;
          cancelBtn.style.opacity = cancelBtn.disabled ? "0.45" : "1";
        }
        if (autoBtn) {
          autoBtn.disabled = isBusy;
          autoBtn.textContent = isWatching ? "Watching Downloads..." : "Exportify + Auto Import";
          autoBtn.style.opacity = autoBtn.disabled ? "0.55" : "1";
        }
        if (watchPill) {
          watchPill.innerHTML = isWatching
            ? `<span class="exp-import-status" style="color:var(--text-muted); font-size:12px; text-transform:none;"><span class="exp-import-spinner"></span>Watching</span>`
            : "";
        }

        if (!rows.length) {
          list.innerHTML = `<div style="color:var(--text-muted); font-size:13px; padding:14px; border:1px solid var(--border-color); border-radius:8px; background:var(--bg-elevated);">Click Exportify + Auto Import, export the playlist CSV in your browser, and NewMusic will build the review queue here.</div>`;
          return;
        }

        list.innerHTML = rows
          .map((row, index) => renderSpotifyImportRow(row, index))
          .join("");
      }

      function renderSpotifyImportRow(row, index) {
        const video = row.selectedVideo;
        const thumb = video?.thumbnail || "./logo.png";
        const rowSearching = row.status === "searching";
        const controlsDisabled = spotifyImportState.searching || spotifyImportState.downloading || rowSearching;
        const disabledAttr = controlsDisabled ? "disabled" : "";
        const choicesDisabled = controlsDisabled || !row.youtubeResults.length ? "disabled" : "";
        const videoMeta = video
          ? [video.channel, video.duration, expFormatViews(video.view_count)]
              .filter(Boolean)
              .join(" | ")
          : rowSearching
            ? "Searching YouTube Music..."
            : "No YouTube result selected";
        const resultTitle = video?.title || row.status;
        const artistSelectValue = row.isNewArtist ? "__new__" : row.artistID;
        const artistOptions = [
          `<option value="__new__" ${row.isNewArtist ? "selected" : ""}>New artist folder</option>`,
          ...artistsDatabase.map(
            (artist) =>
              `<option value="${escapeAttr(artist.artistID)}" ${artist.artistID === artistSelectValue ? "selected" : ""}>${escapeHtml(artist.artist)}</option>`,
          ),
        ].join("");
        const folderLabel = row.isNewArtist
          ? `./assets/${makeSlug(row.artistName || "unknown_artist")}/`
          : `./assets/${getArtistSlugById(row.artistID)}/`;
        const candidatesVisible = spotifyImportState.activeRowId === row.id && row.youtubeResults.length;

        return `
          <div class="exp-import-row ${row.skipped ? "skipped" : ""} ${rowSearching ? "searching" : ""}">
            <div class="exp-import-index">${index + 1}</div>
            <img class="exp-import-thumb" src="${escapeAttr(thumb)}" onerror="this.src='./logo.png'">
            <div class="exp-import-fields">
              <div class="exp-import-full">
                <label>Song Title</label>
                <input class="ctrl-input" type="text" value="${escapeAttr(row.title)}" oninput="expSetSpotifyRowTitle('${escapeAttr(row.id)}', this.value)" style="margin:0;" ${spotifyImportState.downloading ? "disabled" : ""}>
              </div>
              <div>
                <label>Artist Folder</label>
                <select class="ctrl-select" onchange="expSetSpotifyRowArtist('${escapeAttr(row.id)}', this.value)" ${spotifyImportState.downloading ? "disabled" : ""}>${artistOptions}</select>
              </div>
              <div>
                <label>${row.isNewArtist ? "New Artist" : "Folder"}</label>
                ${
                  row.isNewArtist
                    ? `<input class="ctrl-input" type="text" value="${escapeAttr(row.artistName)}" oninput="expSetSpotifyRowNewArtist('${escapeAttr(row.id)}', this.value)" style="margin:0;" ${spotifyImportState.downloading ? "disabled" : ""}>`
                    : `<input class="ctrl-input" type="text" value="${escapeAttr(folderLabel)}" disabled style="margin:0; opacity:0.75;">`
                }
              </div>
              <div class="exp-import-full exp-import-folder-note">${escapeHtml(folderLabel)}</div>
              <label class="exp-import-full" style="display:flex; align-items:center; gap:8px; color:var(--text-muted); text-transform:none; letter-spacing:0; font-size:12px;">
                <input type="checkbox" ${row.skipped ? "checked" : ""} onchange="expToggleSpotifyRowSkipped('${escapeAttr(row.id)}', this.checked)" ${spotifyImportState.downloading ? "disabled" : ""}>
                Skip this track
              </label>
            </div>
            <div class="exp-import-fields">
              <div class="exp-import-full">
                <label>YouTube Music Search</label>
                <input class="ctrl-input" type="text" value="${escapeAttr(row.youtubeQuery)}" oninput="expSetSpotifyRowQuery('${escapeAttr(row.id)}', this.value)" onkeydown="if(event.key === 'Enter') expSearchSpotifyImportRow('${escapeAttr(row.id)}')" style="margin:0;" ${disabledAttr}>
              </div>
              <div class="exp-import-full">
                <div class="exp-import-status">
                  ${rowSearching ? `<span class="exp-import-spinner"></span>` : ""}
                  <div class="exp-item-title exp-import-status-text">${escapeHtml(resultTitle)}</div>
                </div>
                <div class="exp-item-meta">${escapeHtml(videoMeta)}</div>
              </div>
              <div class="exp-import-actions exp-import-full">
                <button class="btn-secondary" style="margin:0;" onclick="expSearchSpotifyImportRow('${escapeAttr(row.id)}')" ${disabledAttr}>Search Again</button>
                <button class="btn-secondary" style="margin:0;" onclick="expShowSpotifyImportChoices('${escapeAttr(row.id)}')" ${choicesDisabled}>Choices</button>
              </div>
            </div>
            ${
              candidatesVisible
                ? `<div class="exp-import-candidates">
                    ${row.youtubeResults
                      .slice(0, 5)
                      .map((candidate, candidateIndex) => {
                        const selected =
                          row.selectedVideo?.url && row.selectedVideo.url === candidate.url;
                        return `
                          <div class="exp-import-candidate ${selected ? "selected" : ""}" onclick="expChooseSpotifyImportVideo('${escapeAttr(row.id)}', ${candidateIndex})">
                            <img class="exp-youtube-thumb" src="${escapeAttr(candidate.thumbnail || "./logo.png")}" onerror="this.src='./logo.png'">
                            <div style="min-width:0;">
                              <div class="exp-item-title">${escapeHtml(candidate.title)}</div>
                              <div class="exp-item-meta">${escapeHtml([candidate.channel, candidate.duration, expFormatViews(candidate.view_count)].filter(Boolean).join(" | "))}</div>
                            </div>
                          </div>`;
                      })
                      .join("")}
                  </div>`
                : ""
            }
          </div>`;
      }

      function expGetExternalPlaylistExports(sinceMs = 0) {
        const downloadsDir = path.join(os.homedir(), "Downloads");
        return fs
          .readdirSync(downloadsDir)
          .map((name) => {
            const abs = path.join(downloadsDir, name);
            const stat = fs.statSync(abs);
            return { name, abs, stat };
          })
          .filter(
            (entry) =>
              entry.stat.isFile() &&
              entry.stat.mtimeMs >= sinceMs &&
              /\.(csv|txt|tsv)$/i.test(entry.name),
          )
          .sort((a, b) => b.stat.mtimeMs - a.stat.mtimeMs);
      }

      function expStopExternalPlaylistWatch(updateUi = false) {
        if (externalPlaylistImportWatch.timer) {
          clearInterval(externalPlaylistImportWatch.timer);
          externalPlaylistImportWatch.timer = null;
        }
        if (updateUi) renderSpotifyImportRows();
      }

      async function expImportExternalPlaylistFilePath(filePath, fileName = "") {
        const text = fs.readFileSync(filePath, "utf8");
        await expBuildExternalPlaylistQueueFromText(text);
        expSetStatus(`Loaded playlist export${fileName ? `: ${fileName}` : ""}`);
      }

      window.expStartExternalPlaylistWatch = function () {
        expStopExternalPlaylistWatch();
        externalPlaylistImportWatch.startedAt = Date.now() - 2000;
        spotifyImportState.cancelRequested = false;
        shell.openExternal("https://exportify.app/");
        expSetStatus("Waiting for a new Exportify CSV in Downloads...");
        const timeoutAt = Date.now() + 10 * 60 * 1000;
        externalPlaylistImportWatch.timer = setInterval(async () => {
          if (Date.now() > timeoutAt) {
            expStopExternalPlaylistWatch(true);
            expSetStatus("Stopped watching Downloads. No new Exportify CSV appeared.");
            return;
          }
          let files = [];
          try {
            files = expGetExternalPlaylistExports(externalPlaylistImportWatch.startedAt);
          } catch (err) {
            expStopExternalPlaylistWatch(true);
            alert("Could not watch your Downloads folder: " + err.message);
            return;
          }
          if (!files.length) return;
          expStopExternalPlaylistWatch(true);
          try {
            await expImportExternalPlaylistFilePath(files[0].abs, files[0].name);
          } catch (err) {
            alert("Could not auto-import the downloaded playlist export: " + err.message);
          }
        }, 2000);
        renderSpotifyImportRows();
      };

      window.expCancelSpotifyImportWork = function () {
        let cancelled = false;
        if (externalPlaylistImportWatch.timer) {
          expStopExternalPlaylistWatch();
          expSetStatus("Exportify auto import cancelled.");
          cancelled = true;
        }
        if (spotifyImportState.searching) {
          spotifyImportState.cancelRequested = true;
          spotifyImportState.searchRunId += 1;
          spotifyImportState.searching = false;
          spotifyImportState.tracks.forEach((row) => {
            if (row.status === "queued" || row.status === "searching") {
              row.status = "cancelled";
            }
          });
          expSetStatus("Playlist search cancelled.");
          cancelled = true;
        }
        if (spotifyImportState.downloading) {
          spotifyImportState.downloadCancelRequested = true;
          expSetStatus("Cancelling remaining playlist downloads...");
          cancelled = true;
        }
        if (cancelled) renderSpotifyImportRows();
      };

      async function expBuildExternalPlaylistQueueFromText(raw) {
        const tracks = expParseExternalPlaylistText(raw);
        if (!tracks.length) {
          return alert("I could not find any title/artist rows in that Exportify CSV.");
        }
        spotifyImportState.tracks = tracks.map(expBuildSpotifyImportRow);
        spotifyImportState.activeRowId = null;
        spotifyImportState.cancelRequested = false;
        spotifyImportState.downloadCancelRequested = false;
        spotifyImportState.searching = true;
        renderSpotifyImportRows();
        await expAutoMatchSpotifyImportRows();
      }

      function expParseExternalPlaylistText(raw) {
        const text = String(raw || "").trim();
        if (!text) return [];
        const csvRows = expParseDelimitedRows(text);
        const headerTracks = expTracksFromDelimitedRows(csvRows);
        if (headerTracks.length) return headerTracks;
        return text
          .split(/\r?\n/)
          .map((line) => line.trim())
          .filter(Boolean)
          .map(expParsePlainTrackLine)
          .filter((track) => track && track.title && track.artists.length);
      }

      function expParseDelimitedRows(text) {
        const rows = [];
        let row = [];
        let value = "";
        let inQuotes = false;
        for (let index = 0; index < text.length; index++) {
          const char = text[index];
          const next = text[index + 1];
          if (char === '"') {
            if (inQuotes && next === '"') {
              value += '"';
              index++;
            } else {
              inQuotes = !inQuotes;
            }
          } else if (!inQuotes && (char === "," || char === "\t" || char === ";")) {
            row.push(value);
            value = "";
          } else if (!inQuotes && (char === "\n" || char === "\r")) {
            if (char === "\r" && next === "\n") index++;
            row.push(value);
            rows.push(row);
            row = [];
            value = "";
          } else {
            value += char;
          }
        }
        row.push(value);
        rows.push(row);
        return rows
          .map((entry) => entry.map((cell) => cell.trim()))
          .filter((entry) => entry.some(Boolean));
      }

      function expNormalizeHeader(value) {
        return String(value || "")
          .toLowerCase()
          .replace(/\([^)]*\)/g, "")
          .replace(/[^a-z0-9]+/g, " ")
          .trim();
      }

      function expFindHeaderIndex(headers, matchers) {
        return headers.findIndex((header) =>
          matchers.some((matcher) => matcher(header)),
        );
      }

      function expTracksFromDelimitedRows(rows) {
        if (!rows.length || rows[0].length < 2) return [];
        const headers = rows[0].map(expNormalizeHeader);
        const titleIndex = expFindHeaderIndex(headers, [
          (header) => header === "track name",
          (header) => header === "song title",
          (header) => header === "title",
          (header) => header === "name",
        ]);
        const artistIndex = expFindHeaderIndex(headers, [
          (header) => header === "artist name",
          (header) => header === "artist names",
          (header) => header === "artists",
          (header) => header === "artist",
        ]);
        if (titleIndex < 0 || artistIndex < 0) return [];
        const durationIndex = expFindHeaderIndex(headers, [
          (header) => header.includes("duration"),
        ]);
        const releaseIndex = expFindHeaderIndex(headers, [
          (header) => header.includes("release date"),
        ]);
        return rows
          .slice(1)
          .map((row) => {
            const title = row[titleIndex] || "";
            const artistText = row[artistIndex] || "";
            const durationValue = durationIndex >= 0 ? row[durationIndex] : "";
            const durationMs = /^\d+$/.test(durationValue)
              ? parseInt(durationValue, 10)
              : parseDuration(durationValue) * 1000;
            const artists = artistText
              .split(/\s*[,;/]\s*|\s+\|\s+/)
              .map((artist) => artist.trim())
              .filter(Boolean);
            return {
              title,
              artists,
              durationMs: durationMs || 0,
              releaseDate: releaseIndex >= 0 ? row[releaseIndex] || "" : "",
              spotifyUrl: "",
            };
          })
          .filter((track) => track.title && track.artists.length);
      }

      function expParsePlainTrackLine(line) {
        const cleaned = String(line || "").replace(/^\d+[.)\-\s]+/, "").trim();
        const byMatch = cleaned.match(/^(.+?)\s+\bby\b\s+(.+)$/i);
        if (byMatch) {
          return {
            title: byMatch[1].trim(),
            artists: [byMatch[2].trim()],
            durationMs: 0,
            releaseDate: "",
            spotifyUrl: "",
          };
        }
        const dashMatch = cleaned.match(/^(.+?)\s+[-–—]\s+(.+)$/);
        if (dashMatch) {
          return {
            artists: [dashMatch[1].trim()],
            title: dashMatch[2].trim(),
            durationMs: 0,
            releaseDate: "",
            spotifyUrl: "",
          };
        }
        return null;
      }

      async function expAutoMatchSpotifyImportRows() {
        const runId = spotifyImportState.searchRunId + 1;
        spotifyImportState.searchRunId = runId;
        spotifyImportState.cancelRequested = false;
        spotifyImportState.searching = true;
        renderSpotifyImportRows();
        for (const row of spotifyImportState.tracks) {
          if (spotifyImportState.cancelRequested || runId !== spotifyImportState.searchRunId) break;
          if (row.skipped) continue;
          await expSearchSpotifyImportRow(row.id, true, runId);
        }
        if (runId !== spotifyImportState.searchRunId) {
          renderSpotifyImportRows();
          return;
        }
        spotifyImportState.searching = false;
        expSetStatus(
          spotifyImportState.cancelRequested
            ? "Playlist import search cancelled."
            : "Playlist import review is ready.",
        );
        renderSpotifyImportRows();
      }

      window.expSearchSpotifyImportRow = async function (rowId, autoSelect = true, runId = 0) {
        const row = expGetSpotifyImportRow(rowId);
        if (!row) return;
        const input = document.querySelector(`input[oninput*="${rowId}"][oninput*="expSetSpotifyRowQuery"]`);
        if (input) row.youtubeQuery = input.value.trim();
        if (!row.youtubeQuery) return alert("Enter a YouTube Music search query first.");
        row.status = "searching";
        spotifyImportState.activeRowId = row.id;
        renderSpotifyImportRows();

        let response;
        try {
          response = await ipcRenderer.invoke("youtube-search-one", {
            query: row.youtubeQuery,
            limit: 10,
          });
        } catch (err) {
          response = { error: err.message || "Search failed." };
        }
        if (runId && runId !== spotifyImportState.searchRunId) {
          row.status = "cancelled";
          renderSpotifyImportRows();
          return;
        }
        if (response.error) {
          row.status = "search failed";
          row.youtubeResults = [];
          renderSpotifyImportRows();
          return;
        }
        row.youtubeResults = response.results || [];
        if (autoSelect && row.youtubeResults.length) {
          row.selectedVideo = row.youtubeResults[0];
          row.status = "matched";
        } else if (row.youtubeResults.length) {
          row.status = "choose a result";
        } else {
          row.selectedVideo = null;
          row.status = "no results";
        }
        renderSpotifyImportRows();
      };

      function expEnsureArtistForImport(row) {
        const existing = row.isNewArtist
          ? expFindArtistByName(row.artistName)
          : getArtistById(row.artistID);
        if (existing) {
          row.artistID = existing.artistID;
          row.artistName = existing.artist;
          row.isNewArtist = false;
          return { artist: existing, created: false };
        }

        const artistName = String(row.artistName || row.artists[0] || "Unknown Artist").trim();
        if (!artistName) throw new Error(`Missing artist for ${row.title}`);
        const slug = expUniqueSlug(
          artistName,
          new Set(artistsDatabase.map((artist) => artist.artistID)),
          "art_",
        );
        const artist = {
          artistID: `art_${slug}`,
          artist: artistName,
          firstlistenYear: String(new Date().getFullYear()),
          country: "Unknown",
          genre: [],
          tags: [],
          members: [],
          paths: {
            cover: `./assets/${slug}/profile.png`,
          },
        };
        expEnsureArtistFolders(slug);
        artistsDatabase.unshift(artist);
        row.artistID = artist.artistID;
        row.artistName = artist.artist;
        row.isNewArtist = false;
        return { artist, created: true };
